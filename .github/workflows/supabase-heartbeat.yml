name: Supabase Heartbeat

on:
  schedule:
    # 每天早上8点自动执行 (UTC时间)
    - cron: '0 0 * * *'
  # 手动触发
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Send heartbeat to Supabase
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/capsules?select=id&limit=1"
